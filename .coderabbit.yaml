# CodeRabbit Configuration — SubAuditor
# Docs: https://docs.coderabbit.ai/reference/configuration
# Schema: https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  review_details: true
  commit_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  poem: false
  suggested_labels: true
  auto_apply_labels: false

  # Skip auto-generated / noise files
  path_filters:
    - "!package-lock.json"
    - "!yarn.lock"
    - "!pnpm-lock.yaml"
    - "!**/*.snap"
    - "!prisma/migrations/**"

  # Project-specific instructions per area of the codebase
  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: |
        This is a Next.js 14 App Router project with TypeScript (strict mode).
        - Path alias `@/*` maps to the project root.
        - Use `"use client"` / `"use server"` directives correctly.
        - Avoid `any` — prefer `unknown` with narrowing or a proper interface.
        - Server-only env vars use `process.env.*`; client-exposed vars must be
          prefixed `NEXT_PUBLIC_`.
    - path: "prisma/schema.prisma"
      instructions: |
        Prisma ORM connected to PostgreSQL (serverless via directUrl).
        - Use the singleton from `@/lib/prisma` — never `new PrismaClient()`.
        - Model naming: PascalCase, singular.
        - All tables need `@@index` on frequently-queried columns.
    - path: "app/api/**"
      instructions: |
        Next.js Route Handlers (App Router).
        - All routes must wrap logic in try/catch and return structured error
          responses with proper status codes.
        - Auth checks via `getServerSession(authOptions)` from `@/lib/auth`.
        - Do not fetch `/api/auth/me` — use `useSession()` on the client or
          `getServerSession()` on the server.
    - path: "components/**/*.tsx"
      instructions: |
        UI components use Tailwind CSS with custom design tokens:
        `--violet`, `--violet-dim`, `--violet-glow`.
        - Client components use framer-motion v12 for animations.
        - Prefer `cva()` from class-variance-authority for variant props.
        - Use `cn()` from `@/lib/utils` to merge Tailwind classes.
    - path: "middleware.ts"
      instructions: |
        NextAuth middleware with `withAuth`.
        - The matcher excludes public routes: homepage, /login, /register,
          /pricing, /onboarding, /api/auth, /api/webhooks, static files.
    - path: "*.test.{ts,tsx}"
      instructions: |
        Jest unit/integration tests.
        - Mock Prisma via `@/lib/__mocks__/prisma` if it exists.
        - Test API routes by calling the handler directly.
    - path: "tests/**"
      instructions: |
        Playwright E2E tests.
        - Smoke tests live in `tests/smoke.spec.ts`.
        - Page objects / fixtures go in `tests/fixtures/`.

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "master"
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5

  tools:
    markdownlint:
      enabled: true
    eslint:
      enabled: true
    gitleaks:
      enabled: true
    prismaLint:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: false
  learnings:
    scope: "auto"
  pull_requests:
    scope: "auto"
